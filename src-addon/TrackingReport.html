<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', Arial, sans-serif; background: #f8f9fa; color: #202124; font-size: 13px; }
    .header { background: #1a1a1a; color: #fff; padding: 16px; text-align: center; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .subtitle { font-size: 11px; color: #f60; margin-top: 2px; }

    .section { background: #fff; margin: 8px; border-radius: 8px; padding: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .section-title { font-size: 11px; font-weight: 600; color: #5f6368; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card { background: #f1f3f4; border-radius: 6px; padding: 10px; text-align: center; }
    .stat-card.highlight { background: #fef3e8; }
    .stat-card.success { background: #e6f4ea; }
    .stat-card.danger { background: #fce8e6; }
    .stat-number { font-size: 22px; font-weight: 700; color: #202124; }
    .stat-card.highlight .stat-number { color: #f60; }
    .stat-card.success .stat-number { color: #188038; }
    .stat-card.danger .stat-number { color: #d93025; }
    .stat-label { font-size: 10px; color: #5f6368; margin-top: 2px; }

    /* Rate bars */
    .rate-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .rate-label { font-size: 12px; color: #5f6368; width: 90px; }
    .rate-bar-bg { flex: 1; height: 8px; background: #e8eaed; border-radius: 4px; overflow: hidden; }
    .rate-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .rate-value { font-size: 12px; font-weight: 600; color: #202124; width: 40px; text-align: right; }

    /* Recipients list */
    .recipient-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f1f3f4; font-size: 12px; }
    .recipient-row:last-child { border-bottom: none; }
    .recipient-email { color: #202124; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .recipient-name { color: #5f6368; font-size: 11px; }
    .status-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .badge-sent { background: #e8eaed; color: #5f6368; }
    .badge-opened { background: #e6f4ea; color: #188038; }
    .badge-clicked { background: #d2e3fc; color: #1967d2; }
    .badge-responded { background: #fef3e8; color: #e37400; }
    .badge-bounced { background: #fce8e6; color: #d93025; }
    .badge-error { background: #fce8e6; color: #d93025; }
    .badge-pending { background: #f1f3f4; color: #80868b; }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
    .filter-tab { font-size: 11px; padding: 4px 10px; border-radius: 12px; border: 1px solid #dadce0;
      background: #fff; color: #5f6368; cursor: pointer; }
    .filter-tab.active { background: #f60; color: #fff; border-color: #f60; }
    .filter-tab:hover { background: #f1f3f4; }
    .filter-tab.active:hover { background: #e55a00; }

    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; margin-top: 8px; }
    .btn-primary { background: #f60; color: #fff; }
    .btn-secondary { background: #e8eaed; color: #202124; }
    .btn:hover { opacity: 0.9; }

    .status-msg { font-size: 11px; color: #5f6368; text-align: center; padding: 8px; }
    .loading { text-align: center; padding: 20px; color: #5f6368; }

    .list-scroll { max-height: 250px; overflow-y: auto; }
  </style>
</head>
<body>

  <div class="header">
    <h1>EMAILING RUBEN COTON</h1>
    <div class="subtitle">Informe de Seguimiento</div>
  </div>

  <!-- Stats principales -->
  <div class="section">
    <div class="section-title">Resumen</div>
    <div id="statsGrid" class="loading">Cargando estadisticas...</div>
  </div>

  <!-- Tasas -->
  <div class="section">
    <div class="section-title">Tasas</div>
    <div id="ratesSection" class="loading">...</div>
  </div>

  <!-- Acciones -->
  <div class="section">
    <button class="btn btn-secondary" onclick="refreshAll()">Actualizar tracking (replies + bounces)</button>
    <button class="btn btn-primary" onclick="followUp()">Follow-up: enviar a no abiertos</button>
  </div>

  <!-- Lista detallada -->
  <div class="section">
    <div class="section-title">Destinatarios</div>
    <div class="filter-tabs" id="filterTabs">
      <span class="filter-tab active" data-filter="" onclick="filterList(this, '')">Todos</span>
      <span class="filter-tab" data-filter="EMAIL_SENT" onclick="filterList(this, 'EMAIL_SENT')">Enviados</span>
      <span class="filter-tab" data-filter="OPENED" onclick="filterList(this, 'OPENED')">Abiertos</span>
      <span class="filter-tab" data-filter="RESPONDED" onclick="filterList(this, 'RESPONDED')">Respondidos</span>
      <span class="filter-tab" data-filter="BOUNCED" onclick="filterList(this, 'BOUNCED')">Rebotados</span>
    </div>
    <div id="recipientList" class="list-scroll loading">Cargando...</div>
  </div>

  <div id="statusMsg" class="status-msg"></div>

<script>
  var currentFilter = '';

  window.addEventListener('load', function() {
    loadStats();
    loadRecipients('');
  });

  function loadStats() {
    google.script.run
      .withSuccessHandler(function(s) {
        // Grid
        document.getElementById('statsGrid').innerHTML =
          '<div class="stats-grid">' +
          '<div class="stat-card highlight"><div class="stat-number">' + s.total + '</div><div class="stat-label">Total</div></div>' +
          '<div class="stat-card"><div class="stat-number">' + (s.sent + s.opened + s.clicked + s.responded) + '</div><div class="stat-label">Enviados</div></div>' +
          '<div class="stat-card success"><div class="stat-number">' + (s.opened + s.clicked + s.responded) + '</div><div class="stat-label">Abiertos</div></div>' +
          '<div class="stat-card"><div class="stat-number">' + s.responded + '</div><div class="stat-label">Respondidos</div></div>' +
          '<div class="stat-card danger"><div class="stat-number">' + s.bounced + '</div><div class="stat-label">Rebotados</div></div>' +
          '<div class="stat-card"><div class="stat-number">' + s.pending + '</div><div class="stat-label">Pendientes</div></div>' +
          '</div>';

        // Rates
        document.getElementById('ratesSection').innerHTML =
          buildRateBar('Entrega', s.deliveryRate, '#188038') +
          buildRateBar('Apertura', s.openRate, '#1967d2') +
          buildRateBar('Clicks', s.clickRate, '#e37400') +
          buildRateBar('Respuesta', s.responseRate, '#f60') +
          buildRateBar('Rebote', s.bounceRate, '#d93025');
      })
      .withFailureHandler(function(err) {
        document.getElementById('statsGrid').innerHTML = '<div style="color:#d93025">Error: ' + err.message + '</div>';
      })
      .getCampaignStats();
  }

  function buildRateBar(label, pct, color) {
    return '<div class="rate-row">' +
      '<span class="rate-label">' + label + '</span>' +
      '<div class="rate-bar-bg"><div class="rate-bar-fill" style="width:' + pct + '%; background:' + color + ';"></div></div>' +
      '<span class="rate-value">' + pct + '%</span>' +
      '</div>';
  }

  function loadRecipients(filter) {
    currentFilter = filter;
    google.script.run
      .withSuccessHandler(function(list) {
        var el = document.getElementById('recipientList');
        if (list.length === 0) {
          el.innerHTML = '<div style="text-align:center; color:#80868b; padding:12px;">Sin resultados</div>';
          return;
        }
        el.innerHTML = list.map(function(r) {
          return '<div class="recipient-row">' +
            '<div><div class="recipient-email">' + r.email + '</div>' +
            (r.name ? '<div class="recipient-name">' + r.name + '</div>' : '') +
            '</div>' +
            '<span class="status-badge ' + getBadgeClass(r.status) + '">' + r.status + '</span>' +
            '</div>';
        }).join('');
      })
      .getDetailedTracking(filter || null);
  }

  function getBadgeClass(status) {
    var s = status.toUpperCase();
    if (s === 'EMAIL_SENT') return 'badge-sent';
    if (s === 'OPENED') return 'badge-opened';
    if (s === 'CLICKED') return 'badge-clicked';
    if (s === 'RESPONDED') return 'badge-responded';
    if (s === 'BOUNCED') return 'badge-bounced';
    if (s.indexOf('ERROR') === 0) return 'badge-error';
    return 'badge-pending';
  }

  function filterList(el, filter) {
    document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
    loadRecipients(filter);
  }

  function refreshAll() {
    document.getElementById('statusMsg').textContent = 'Actualizando tracking...';
    google.script.run
      .withSuccessHandler(function(r) {
        document.getElementById('statusMsg').textContent =
          'Actualizado: ' + r.replies.updated + ' replies, ' + r.bounces.updated + ' bounces';
        loadStats();
        loadRecipients(currentFilter);
      })
      .withFailureHandler(function(err) {
        document.getElementById('statusMsg').textContent = 'Error: ' + err.message;
      })
      .refreshTracking();
  }

  function followUp() {
    if (!confirm('Abrir Mail Merge filtrado para enviar follow-up a no-abiertos?')) return;
    google.script.run.showMailMergeSidebar();
  }
</script>
</body>
</html>
